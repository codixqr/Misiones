name: 🔄 Otomatik Blog Güncelleme

on:
  schedule:
    # Her Pazar gece 00:00'da çalışır (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Manuel tetikleme imkanı

jobs:
  update-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛒 Repoyu Çek
        uses: actions/checkout@v4

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Makaleleri Güncelle
        run: python scripts/otel_export.py

      - name: 💾 Değişiklikleri Kaydet ve Push Et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: otomatik blog güncellemesi [skip ci]" && git push)
